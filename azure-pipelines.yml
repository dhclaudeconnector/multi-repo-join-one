trigger: none

schedules:
  - cron: "0 * * * *"
    displayName: Hourly repo sync
    branches:
      include:
        - main
    always: true

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: "20.x"

jobs:
  - job: repo_sync
    displayName: Repo Sync Hourly
    timeoutInMinutes: 59
    steps:
      - checkout: self

      - task: NodeTool@0
        inputs:
          versionSpec: "$(NODE_VERSION)"
        displayName: Setup Node.js

      - script: npm ci
        displayName: Install dependencies

      - script: npm run build
        displayName: Build

      - bash: |
          set -euo pipefail
          mkdir -p artifacts
          cp .deploy/env.prod .deploy/env.runtime
          set -a
          source .deploy/env.runtime
          set +a
          export FIREBASE_SERVICE_ACCOUNT="$(FIREBASE_SERVICE_ACCOUNT_B64)"
          export TOKEN__GITHUB="$(SYNC_GITHUB_TOKEN)"
          export TOKEN__AZURE="$(SYNC_AZURE_TOKEN)"
          export WORK_DIR="$(Agent.TempDirectory)/repo-sync"
          export LOG_FORMAT="json"
          export LOG_LEVEL="info"

          echo "repo-sync started at $(date -Is)" | tee artifacts/repo-sync.log
          timeout 55m node dist/cli.js start 2>&1 | tee -a artifacts/repo-sync.log || code=$?
          code=${code:-0}
          echo "repo-sync ended at $(date -Is) with code=$code" | tee -a artifacts/repo-sync.log
          if [ "$code" = "124" ]; then
            echo "timeout reached; next scheduled run will resume queue" | tee -a artifacts/repo-sync.log
            exit 0
          fi
          exit "$code"
        displayName: Run repo sync

      - bash: |
          set -euo pipefail
          set -a
          source .deploy/env.prod
          set +a
          export TOKEN__GITHUB="$(SYNC_GITHUB_TOKEN)"
          export TOKEN__AZURE="$(SYNC_AZURE_TOKEN)"
          node scripts/check-output.js --env .deploy/env.prod --artifact artifacts/repo-sync.log --out artifacts/check-report.json
        displayName: Check output summary
        continueOnError: true

      - publish: artifacts
        artifact: repo-sync-logs
        displayName: Publish logs artifact
        condition: always()
